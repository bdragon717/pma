name: Android Release Build
on:
  push:
    tags:
      - 'v*' # v1.0.0 같은 태그를 push하면 실행

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 코드 체크아웃
        uses: actions/checkout@v4

      - name: ⚙️ Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 최신 SDK 권장 버전
          cache: 'npm'

      - name: 📦 의존성 설치
        run: npm install

      - name: 🚀 Expo & EAS 설치
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🛠 APK 빌드 (GitHub 서버 내 로컬 빌드)
        # --local 옵션으로 빌드 자원을 GitHub에서 사용하고 APK 파일명을 지정합니다.
        run: eas build --profile production --platform android --non-interactive --local --output=./app-release.apk

      - name: 📢 GitHub Release 생성 및 업로드
        uses: softprops/action-gh-release@v2 # 최신 버전 권장
        with:
          files: ./app-release.apk
          name: Release ${{ github.ref_name }}
          body: "GitHub Actions를 통해 자동 빌드된 안드로이드 APK 파일입니다."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}